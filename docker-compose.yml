services:
  frontend:
    image: ghcr.io/misilelab/arxgorithm/frontend:latest
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    image: ghcr.io/misilelab/arxgorithm/backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: arxgorithm
      POSTGRES_PASSWORD: arxgorithm
      POSTGRES_DB: arxgorithm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  crawler:
    image: ghcr.io/misilelab/arxgorithm/crawler:latest
    env_file: .env
    depends_on:
      - postgres

volumes:
  postgres_data:
