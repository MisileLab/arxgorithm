services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://arxgorithm:arxgorithm@postgres:5432/arxgorithm
      - DEEPINFRA_API_KEY=OJu8NJ4ukAHZ43vDfNLnkLH6bC2YULN1
      - CORS_ORIGINS=["http://localhost:3000"]
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: arxgorithm
      POSTGRES_PASSWORD: arxgorithm
      POSTGRES_DB: arxgorithm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://arxgorithm:arxgorithm@postgres:5432/arxgorithm
      - DEEPINFRA_API_KEY=OJu8NJ4ukAHZ43vDfNLnkLH6bC2YULN1
    depends_on:
      - postgres
    profiles:
      - crawler

volumes:
  postgres_data:
