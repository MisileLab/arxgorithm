services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HELIXDB_URL=http://helixdb:6334
      - DATABASE_URL=postgresql+asyncpg://arxgorithm:arxgorithm@postgres:5432/arxgorithm
      - CORS_ORIGINS=["http://localhost:3000"]
    depends_on:
      helixdb:
        condition: service_started
      postgres:
        condition: service_started

  helixdb:
    image: helixdb/helixdb:latest
    ports:
      - "6334:6334"
    volumes:
      - helixdb_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arxgorithm
      POSTGRES_PASSWORD: arxgorithm
      POSTGRES_DB: arxgorithm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    environment:
      - HELIXDB_URL=http://helixdb:6334
      - DATABASE_URL=postgresql://arxgorithm:arxgorithm@postgres:5432/arxgorithm
    depends_on:
      - helixdb
      - postgres
    profiles:
      - crawler

volumes:
  helixdb_data:
  postgres_data:
